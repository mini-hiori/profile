    <script>
    function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') {
                if (inQuotes && line[i + 1] === '"') {
                    current += '"';
                    i++;
                } else {
                    inQuotes = !inQuotes;
                }
            } else if (ch === ',' && !inQuotes) {
                result.push(current);
                current = '';
            } else {
                current += ch;
            }
        }
        result.push(current);
        return result;
    }

    function parseCSV(text) {
        const lines = text.split('\n');
        const headers = parseCSVLine(lines[0]);
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].replace(/\r$/, '');
            if (!line.trim()) continue;
            const values = parseCSVLine(line);
            const row = {};
            headers.forEach((h, idx) => { row[h.trim()] = (values[idx] || '').trim(); });
            rows.push(row);
        }
        return rows;
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function link(url, text) {
        return url
            ? `<a href="${escapeHtml(url)}">${escapeHtml(text)}</a>`
            : escapeHtml(text);
    }

    async function loadWorks() {
        const response = await fetch('data/works.csv');
        const text = await response.text();
        const rows = parseCSV(text);

        // Group: years (ordered by first appearance) → events (ordered by first appearance)
        const yearOrder = [];
        const yearMap = {};
        for (const row of rows) {
            const y = row.year;
            if (!yearMap[y]) {
                yearMap[y] = {};
                yearOrder.push(y);
            }
            const eventKey = row.event_name + '\x00' + row.event_url;
            if (!yearMap[y][eventKey]) {
                yearMap[y][eventKey] = { event_name: row.event_name, event_url: row.event_url, songs: [] };
            }
            if (row.song_name || row.note1) {
                yearMap[y][eventKey].songs.push({
                    song_prefix: row.song_prefix,
                    song_name:   row.song_name,
                    song_url:    row.song_url,
                    feat_name:   row.feat_name,
                    feat_url:    row.feat_url,
                    note1:       row.note1,
                    note1_url:   row.note1_url,
                    note2:       row.note2,
                    note2_url:   row.note2_url,
                });
            }
        }

        let html = '<ul>';
        for (const y of yearOrder) {
            html += `<h3>${escapeHtml(y)}年</h3><ul>`;
            for (const eventKey of Object.keys(yearMap[y])) {
                const ev = yearMap[y][eventKey];
                html += '<li><h4>';
                html += ev.event_url ? link(ev.event_url, ev.event_name) : escapeHtml(ev.event_name);
                html += '</h4>';
                for (const s of ev.songs) {
                    if (s.song_name) {
                        html += '<p>';
                        if (s.song_prefix) html += escapeHtml(s.song_prefix);
                        html += s.song_url ? link(s.song_url, s.song_name) : escapeHtml(s.song_name);
                        if (s.feat_name) {
                            html += '(feat. ';
                            html += s.feat_url ? link(s.feat_url, s.feat_name) : escapeHtml(s.feat_name);
                            html += ')';
                        }
                        html += '</p>';
                    }
                    if (s.note1) html += `<p>${link(s.note1_url, s.note1)}</p>`;
                    if (s.note2) html += `<p>${link(s.note2_url, s.note2)}</p>`;
                }
                html += '</li>';
            }
            html += '</ul>';
        }
        html += '</ul>';

        document.getElementById('works-container').innerHTML = html;
    }

    loadWorks().catch(err => {
        document.getElementById('works-container').textContent = '読み込みに失敗しました: ' + err.message;
    });
    </script>
